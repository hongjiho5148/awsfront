name: Deploy Test Branch to S3

on:
  push:
    branches: [ "test-deploy" ] # <--- 새로 만드실 브랜치 이름을 적으세요!

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET_NAME: hong-cli-web-test # 테스트용 버킷 이름

jobs:
  deploy:
    name: Simple HTML Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # AWS 인증 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 빌드 없이 index.html 파일 하나만 S3에 업로드
    - name: Deploy index.html to S3
      run: |
        aws s3 cp index.html s3://${{ env.S3_BUCKET_NAME }}/

